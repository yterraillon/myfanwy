name: Publish Docker image
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Create Github Deployment
      id: create_deployment
      run: |
        RESPONSE=$(curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/deployments \
          -d '{"ref": "${{ github.sha }}", "environment": "production", "auto_merge": false}')
        echo "DEPLOYMENT_ID=$(echo $RESPONSE | jq -r '.id')" >> $GITHUB_ENV

    - name: Set Deployment Status to in_progress
      run: |
        curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/deployments/${{ env.DEPLOYMENT_ID }}/statuses \
          -d '{"state": "in_progress"}'
    
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Web/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/myfanwy:${{ env.VERSION }}
          ghcr.io/${{ github.repository_owner }}/myfanwy:latest
        build-args: VERSION=${{ env.VERSION }}

    - name: Set Deployment Status to success
      if: success()
      run: |
        curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/deployments/${{ env.DEPLOYMENT_ID }}/statuses \
          -d '{"state": "success"}'

    - name: Set Deployment Status to failure
      if: failure()
      run: |
        curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/deployments/${{ env.DEPLOYMENT_ID }}/statuses \
          -d '{"state": "failure"}